<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Design Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
    }

    #game-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #game-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #game-container canvas {
      display: block;
    }

    #ui-root {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    #ui-root > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="game-container"></div>
    <div id="ui-root"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
