<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1428"/>
      <stop offset="100%" style="stop-color:#1a2240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff"/>
      <stop offset="100%" style="stop-color:#66aaff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#4488ff" stroke-width="1.5" opacity="0.4"/>
  <!-- Nodes (system components) -->
  <rect x="8" y="12" width="14" height="10" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="8" y="42" width="14" height="10" rx="3" fill="url(#accent)" opacity="0.9"/>
  <!-- Center node (load balancer / hub) -->
  <rect x="28" y="24" width="16" height="16" rx="4" fill="#aa66ff" opacity="0.9"/>
  <text x="36" y="35" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#ffffff">/\</text>
  <!-- Right node (server) -->
  <rect x="50" y="27" width="10" height="10" rx="3" fill="#44cc66" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="22" y1="17" x2="28" y2="30" stroke="#4488ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="22" y1="47" x2="28" y2="34" stroke="#4488ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="32" x2="50" y2="32" stroke="#44cc66" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Small dots on connections -->
  <circle cx="25" cy="24" r="1.5" fill="#4488ff"/>
  <circle cx="25" cy="40" r="1.5" fill="#4488ff"/>
  <circle cx="47" cy="32" r="1.5" fill="#44cc66"/>
</svg>
